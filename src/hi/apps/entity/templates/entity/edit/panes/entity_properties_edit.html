{% load icons %}
<form action="{% url 'entity_properties_edit' entity_id=entity.id %}"
      method="post"
      class="form" data-async="true"
      oninput="Hi.updateFormDirtyState(this)">
  {% csrf_token %}
  <div>
    {% include "entity/edit/panes/entity_edit_form.html" %}
  </div>

  <div class="text-center" >
    <button id="hi-entity-properties-edit-button" type="submit" class="btn btn-primary btn-block"
            name="action" value="update" disabled>
      {% icon "save" css_class="hi-icon-left" %}UPDATE
    </button>
  </div>
</form>
